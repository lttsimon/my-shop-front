name: 自动构建与部署

on:
  push:
    branches:
      - master # 监听 master 分支的推送

# 关键：这里显式声明了流水线拥有写权限
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. 安装 Node.js 环境
      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. 安装项目依赖
      - name: Install Dependencies 🔧
        run: npm install

      # 4. 运行 Vite 打包
      - name: Build Project 🏗️
        run: npm run build

      # 5. 部署到 gh-pages 分支
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 打包出来的文件夹叫 dist
          branch: gh-pages # 部署到 gh-pages 分支（会自动创建）
